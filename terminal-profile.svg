<svg width="850" height="480" viewBox="0 0 850 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Courier New', Courier, monospace; }
      .label { fill: #38bdf8; font-size: 12px; }
      .value { fill: #d1d5db; font-size: 12px; }
      .section { fill: #38bdf8; font-size: 10px; font-weight: bold; letter-spacing: 1.5px; }
      .pink { fill: #e879f9; }
      .dim { fill: #6b7280; }
      .badge-text { fill: #d1d5db; font-size: 11px; }
      .scanline { animation: scan 4s linear infinite; }
      @keyframes scan {
        0%   { transform: translateY(0px); }
        50%  { transform: translateY(310px); }
        100% { transform: translateY(0px); }
      }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.2; }
      }
    </style>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0L0 0 0 20" fill="none" stroke="#1e293b" stroke-width="0.8" opacity="0.6"/>
    </pattern>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="60%" stop-color="#38bdf8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

